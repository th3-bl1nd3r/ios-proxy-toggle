name: ProxyToggle
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

settings:
  base:
    SDKROOT: iphoneos
    SUPPORTED_PLATFORMS: iphoneos
    SUPPORTS_MACCATALYST: "NO"
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  ProxyToggle:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
      - AppIcons
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.proxytoggle
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/ProxyToggle.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: PacketTunnel
      - target: ProxyWidget

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - Tunnel
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.proxytoggle.tunnel
        INFOPLIST_FILE: Tunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tunnel/Tunnel.entitlements
        GENERATE_INFOPLIST_FILE: "YES"

  ProxyWidget:
    type: app-extension
    platform: iOS
    sources:
      - Widget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.proxytoggle.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        GENERATE_INFOPLIST_FILE: "YES"
