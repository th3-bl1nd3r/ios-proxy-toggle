name: Build & Release IPA

on:
  push:
    tags:
      - "v*"            # push a tag like v1.0.0 to cut a release
  workflow_dispatch:    # or run manually from the Actions tab (build only)

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: xcodebuild -version

      - name: Install build tools
        run: brew install xcodegen ldid

      - name: Build unsigned IPA
        run: ./build.sh

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyToggle-ipa
          path: build/ProxyToggle.ipa
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" build/ProxyToggle.ipa \
            --title "Proxy Toggle $GITHUB_REF_NAME" \
            --notes "Unsigned build for jailbroken / TrollStore installs (iOS 16+).
          Install \`ProxyToggle.ipa\` with TrollStore — it preserves the embedded
          NetworkExtension + App Group entitlements. See README.md."
